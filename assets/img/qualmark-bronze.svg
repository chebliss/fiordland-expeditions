<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="60" cy="60" r="56"/>
    </clipPath>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#2d5a27" stroke-width="3"/>
  <!-- Background -->
  <circle cx="60" cy="60" r="56" fill="#2d5a27"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
  <!-- NZ Fern silhouette (simplified) -->
  <g fill="#fff" transform="translate(60,58) scale(0.9)">
    <!-- Central stem -->
    <rect x="-1.2" y="-28" width="2.4" height="38" rx="1.2"/>
    <!-- Fronds left -->
    <ellipse cx="-10" cy="-18" rx="9" ry="3.5" transform="rotate(-30,-10,-18)"/>
    <ellipse cx="-14" cy="-8" rx="10" ry="3.5" transform="rotate(-40,-14,-8)"/>
    <ellipse cx="-13" cy="3" rx="10" ry="3.2" transform="rotate(-50,-13,3)"/>
    <ellipse cx="-9" cy="13" rx="8" ry="2.8" transform="rotate(-55,-9,13)"/>
    <!-- Fronds right -->
    <ellipse cx="10" cy="-18" rx="9" ry="3.5" transform="rotate(30,10,-18)"/>
    <ellipse cx="14" cy="-8" rx="10" ry="3.5" transform="rotate(40,14,-8)"/>
    <ellipse cx="13" cy="3" rx="10" ry="3.2" transform="rotate(50,13,3)"/>
    <ellipse cx="9" cy="13" rx="8" ry="2.8" transform="rotate(55,9,13)"/>
  </g>
  <!-- QUAL MARK text -->
  <text x="60" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" font-weight="700" letter-spacing="2" fill="#fff">QUALMARK</text>
  <!-- BRONZE text -->
  <text x="60" y="109" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="400" letter-spacing="3" fill="#fff" opacity="0.85">BRONZE</text>
  <!-- Stars top -->
  <text x="60" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fff" opacity="0.7">★ ★ ★</text>
</svg>
